<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Udemy Transcript Copier</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      color: #1c1d1f;
      width: 280px;
      padding: 16px;
      background: #fff;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8e8e8;
    }

    header svg {
      width: 24px;
      height: 24px;
      fill: #a435f0;
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1c1d1f;
    }

    section {
      margin-bottom: 14px;
    }

    label.section-label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6a6f73;
      margin-bottom: 8px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .radio-group label,
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #1c1d1f;
    }

    .radio-group input[type="radio"],
    .checkbox-group input[type="checkbox"] {
      accent-color: #a435f0;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .save-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #e8e8e8;
    }

    button#save-btn {
      flex: 1;
      background-color: #a435f0;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    button#save-btn:hover {
      background-color: #8710d8;
    }

    button#save-btn:active {
      background-color: #7600c0;
    }

    #saved-msg {
      font-size: 13px;
      color: #4caf50;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #saved-msg.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/>
    </svg>
    <h1>Transcript Copier</h1>
  </header>

  <section>
    <label class="section-label">Copy Format</label>
    <div class="radio-group">
      <label>
        <input type="radio" name="format" value="plain" />
        Plain text
      </label>
      <label>
        <input type="radio" name="format" value="markdown" />
        Markdown
      </label>
      <label>
        <input type="radio" name="format" value="json" />
        JSON
      </label>
    </div>
  </section>

  <section>
    <label class="section-label">Options</label>
    <div class="checkbox-group">
      <label>
        <input type="checkbox" id="include-metadata" />
        Include lesson &amp; course title
      </label>
    </div>
  </section>

  <div class="save-row">
    <button id="save-btn" type="button">Save</button>
    <span id="saved-msg" aria-live="polite">Saved!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
