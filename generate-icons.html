<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Icon Generator - Udemy Transcript Copier</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f5f5f5; }
    h2 { margin-bottom: 16px; }
    .icons { display: flex; gap: 24px; align-items: flex-end; margin-bottom: 24px; }
    canvas { border: 1px solid #ccc; display: block; }
    label { font-size: 12px; color: #666; display: block; text-align: center; margin-top: 4px; }
    button { background: #a435f0; color: white; border: none; padding: 10px 24px; font-size: 14px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #8710d8; }
    p { font-size: 13px; color: #555; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>Icon Generator — Udemy Transcript Copier</h2>
  <div class="icons">
    <div>
      <canvas id="c16" width="16" height="16"></canvas>
      <label>16×16</label>
    </div>
    <div>
      <canvas id="c48" width="48" height="48"></canvas>
      <label>48×48</label>
    </div>
    <div>
      <canvas id="c128" width="128" height="128"></canvas>
      <label>128×128</label>
    </div>
  </div>
  <button id="download-btn">Download All Icons</button>
  <p>Icons will be downloaded as <code>icon-16.png</code>, <code>icon-48.png</code>, <code>icon-128.png</code>.<br/>
     Move them into the <code>icons/</code> folder of the extension.</p>

  <script>
    /**
     * Draw a clipboard icon on a canvas at the given size.
     * Background: Udemy purple (#a435f0), icon: white.
     */
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');
      const s = size / 24; // scale factor (design is 24x24)

      // Background
      ctx.fillStyle = '#a435f0';
      ctx.beginPath();
      // Rounded rectangle
      const r = size * 0.15;
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();

      // Clipboard icon (Material Design clipboard path, scaled)
      ctx.fillStyle = 'white';
      ctx.scale(s, s);

      // Outer clipboard body
      ctx.beginPath();
      ctx.moveTo(19, 2);
      ctx.lineTo(14.82, 2);
      // arc for notch
      ctx.bezierCurveTo(14.4, 0.84, 13.3, 0, 12, 0);
      ctx.bezierCurveTo(10.7, 0, 9.6, 0.84, 9.18, 2);
      ctx.lineTo(5, 2);
      ctx.bezierCurveTo(3.9, 2, 3, 2.9, 3, 4);
      ctx.lineTo(3, 20);
      ctx.bezierCurveTo(3, 21.1, 3.9, 22, 5, 22);
      ctx.lineTo(19, 22);
      ctx.bezierCurveTo(20.1, 22, 21, 21.1, 21, 20);
      ctx.lineTo(21, 4);
      ctx.bezierCurveTo(21, 2.9, 20.1, 2, 19, 2);
      ctx.closePath();

      // Hole in top (clip)
      ctx.moveTo(12, 0);
      ctx.arc(12, 1, 1, 0, Math.PI * 2, true); // counter-clockwise hole
      ctx.closePath();
      ctx.fill('evenodd');

      // Inner body cutout — draw white rectangle to simulate clipboard content
      ctx.fillStyle = '#a435f0';
      // top clip area (paper behind clip)
      ctx.fillRect(7, 4, 10, 3); // clip bar backing

      ctx.fillStyle = 'white';
      // Lines on clipboard
      if (size >= 48) {
        ctx.fillRect(7, 10, 10, 1.5);
        ctx.fillRect(7, 13.5, 10, 1.5);
        ctx.fillRect(7, 17, 6, 1.5);
      }
    }

    // Simpler, more reliable icon drawing
    function drawIconSimple(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');

      // Purple background with rounded corners
      const r = Math.max(2, size * 0.12);
      ctx.fillStyle = '#a435f0';
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.arcTo(size, 0, size, size, r);
      ctx.arcTo(size, size, 0, size, r);
      ctx.arcTo(0, size, 0, 0, r);
      ctx.arcTo(0, 0, size, 0, r);
      ctx.closePath();
      ctx.fill();

      // Draw white clipboard using Path2D scaled to canvas size
      const scale = size / 24;
      ctx.save();
      ctx.scale(scale, scale);
      ctx.fillStyle = 'white';

      // Clipboard outer shape
      const p = new Path2D('M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z');
      ctx.fill(p);

      ctx.restore();
    }

    const sizes = [16, 48, 128];
    sizes.forEach(size => {
      const canvas = document.getElementById(`c${size}`);
      drawIconSimple(canvas);
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      sizes.forEach(size => {
        const canvas = document.getElementById(`c${size}`);
        const link = document.createElement('a');
        link.download = `icon-${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  </script>
</body>
</html>
